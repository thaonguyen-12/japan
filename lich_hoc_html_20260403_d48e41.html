<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JLPT N3 Lộ trình 2026 - Lịch học tối ưu (Tháng 4-7)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background-color: #121212;
            color: #EAEAEA;
            padding: 1rem;
        }

        .wrap {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0.5rem 0 2rem;
        }

        /* Phase bar */
        .phase-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pb {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            background: #2A2A2A;
            color: #ddd;
            letter-spacing: 0.3px;
        }

        .pb1 { background: #5A7AFF20; color: #B6C8FF; border-left: 3px solid #5A7AFF; }
        .pb2 { background: #1D9E7520; color: #A8E6CF; border-left: 3px solid #1D9E75; }
        .pb3 { background: #D85A3020; color: #FFC9B0; border-left: 3px solid #D85A30; }
        .pb-exam { background: #FFA55930; color: #FFE0B5; border-left: 3px solid #FFA559; font-weight: 700; }

        /* top row */
        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1E1E1E;
            padding: 4px 12px;
            border-radius: 48px;
        }

        .month-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #F0F0F0;
            min-width: 150px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .nav-btn {
            padding: 6px 18px;
            border-radius: 32px;
            border: none;
            background: #2C2C2C;
            color: #DDD;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #4A4A4A;
            color: white;
            transform: scale(0.97);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: #1A1A1A;
            padding: 8px 16px;
            border-radius: 48px;
        }

        .lg-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            color: #C0C0C0;
        }

        .lg-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* calendar grid */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 1.5rem;
        }

        .dow {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 0 6px;
            color: #AAAAAA;
            background: #1E1E1E;
            border-radius: 12px 12px 6px 6px;
        }

        .dow.sat { color: #7A9EFF; }
        .dow.sun { color: #FF8A7A; }

        /* cell styles */
        .cell {
            border: 1px solid #2F2F2F;
            border-radius: 14px;
            padding: 8px 6px;
            min-height: 102px;
            background: #1D1D1D;
            cursor: pointer;
            transition: all 0.12s linear;
            display: flex;
            flex-direction: column;
        }

        .cell:hover {
            border-color: #7A7AFF;
            background: #252525;
            transform: scale(0.99);
        }

        .cell.empty {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }

        .cell.today {
            border: 2px solid #FFB347;
            background: #2A241A;
        }

        .cell.sat { background: #3F4DFF08; }
        .cell.sun { background: #FF555508; }

        .cell.phase1 { border-top: 3px solid #7F77DD; }
        .cell.phase2 { border-top: 3px solid #1D9E75; }
        .cell.phase3 { border-top: 3px solid #D85A30; }
        .cell.exam {
            background: #FFE1C4;
            border: 2px solid #E05A2E;
            box-shadow: 0 0 4px #ff8c5a;
        }
        .cell.exam .cell-date { color: #B23C1A; font-weight: bold; }

        .cell-date {
            font-size: 14px;
            font-weight: 600;
            color: #CECECE;
            margin-bottom: 6px;
        }

        .cell.today .cell-date {
            color: #FFB347;
            font-weight: 700;
        }

        /* pill styles inside calendar */
        .pill {
            border-radius: 20px;
            padding: 2px 6px;
            font-size: 9px;
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #2E2E2E;
            color: #EAEAEA;
        }

        .p-vocab { background: #5A7AFF; color: white; }
        .p-kanji { background: #3F6B9F; color: white; }
        .p-grammar { background: #6D8F4A; color: white; }
        .p-listen { background: #D9A13B; color: #1F1A10; }
        .p-reading { background: #BD7F5A; color: white; }
        .p-stm32 { background: #6C757D; color: white; }
        .p-review { background: #AD7A9C; color: white; }
        .p-mock { background: #E35F5F; color: white; }
        .p-rest { background: #5D715E; color: white; }

        /* detail panel */
        .detail-panel {
            border: 1px solid #3A3A3A;
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            background: #1C1C1C;
            margin-top: 0.8rem;
            backdrop-filter: blur(2px);
        }

        .detail-date {
            font-size: 1.2rem;
            font-weight: 700;
            color: #F5E6D3;
            margin-bottom: 14px;
            border-left: 4px solid #FFA559;
            padding-left: 12px;
        }

        .detail-block {
            margin-bottom: 14px;
            background: #262626;
            border-radius: 20px;
            padding: 10px 14px;
        }

        .detail-time {
            font-size: 0.75rem;
            font-weight: 600;
            color: #FFC285;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .detail-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detail-pill {
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #333;
            color: #f0f0f0;
        }

        .no-select {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
            padding: 1rem;
            font-style: italic;
        }

        @media (max-width: 700px) {
            .cell {
                min-height: 78px;
                padding: 4px 3px;
            }
            .pill {
                font-size: 7px;
                padding: 1px 3px;
            }
            .cell-date {
                font-size: 11px;
            }
            .detail-panel {
                padding: 1rem;
            }
            .pb {
                font-size: 10px;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <!-- Phase indicators -->
    <div class="phase-bar">
        <span class="pb pb1">📘 Giai đoạn 1: Nền tảng (3/4 – 27/4)</span>
        <span class="pb pb2">📌 Giai đoạn 2: Củng cố (28/4 – 1/6)</span>
        <span class="pb pb3">⚡ Giai đoạn 3: Luyện đề (2/6 – 6/7)</span>
        <span class="pb pb-exam">🎯 Thi JLPT N3: 6/7/2026</span>
    </div>

    <div class="top-row">
        <div class="month-nav">
            <button class="nav-btn" id="prev-btn">← Tháng trước</button>
            <div class="month-title" id="month-title"></div>
            <button class="nav-btn" id="next-btn">Tháng sau →</button>
        </div>
        <div class="legend">
            <div class="lg-item"><div class="lg-dot p-vocab"></div>Từ vựng</div>
            <div class="lg-item"><div class="lg-dot p-kanji"></div>Kanji</div>
            <div class="lg-item"><div class="lg-dot p-grammar"></div>Ngữ pháp</div>
            <div class="lg-item"><div class="lg-dot p-listen"></div>Nghe</div>
            <div class="lg-item"><div class="lg-dot p-reading"></div>Đọc hiểu</div>
            <div class="lg-item"><div class="lg-dot p-stm32"></div>STM32</div>
            <div class="lg-item"><div class="lg-dot p-mock"></div>Thi thử</div>
        </div>
    </div>

    <!-- day of week header -->
    <div class="cal-grid" id="cal-header">
        <div class="dow">T2</div><div class="dow">T3</div><div class="dow">T4</div>
        <div class="dow">T5</div><div class="dow">T6</div><div class="dow sat">T7</div><div class="dow sun">CN</div>
    </div>
    <div class="cal-grid" id="cal-body"></div>

    <div class="detail-panel" id="detail-panel">
        <div class="no-select">📅 Nhấn vào bất kỳ ngày nào để xem chi tiết kế hoạch học tập (từ 3/4 đến 6/7/2026).</div>
    </div>
</div>

<script>
    // -------- DATA & CONSTANTS ----------
    const MONTHS_VI = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
    let curYear = 2026;
    let curMonth = 3;      // tháng 4 (index 3)

    // Xác định giai đoạn (phase) theo ngày
    function getPhase(year, month, day) {
        const dt = new Date(year, month, day);
        const startPhase1 = new Date(2026, 3, 3);   // 3/4
        const endPhase1 = new Date(2026, 3, 27);    // 27/4
        const endPhase2 = new Date(2026, 5, 1);     // 1/6
        const endPhase3 = new Date(2026, 6, 6);     // 6/7

        if (dt < startPhase1) return 0;
        if (dt <= endPhase1) return 1;
        if (dt <= endPhase2) return 2;
        if (dt <= endPhase3) return 3;
        return 0;
    }

    function isSat(year, month, day) { return new Date(year, month, day).getDay() === 6; }
    function isSun(year, month, day) { return new Date(year, month, day).getDay() === 0; }
    function isWorkday(year, month, day) {
        const dow = new Date(year, month, day).getDay();
        return dow >= 1 && dow <= 5;
    }

    // ---- Lịch học chi tiết theo ngày (phong phú, sát N3 & STM32) ----
    function getSchedule(year, month, day) {
        const phase = getPhase(year, month, day);
        if (phase === 0) return null;

        // Ngày thi chính thức
        if (year === 2026 && month === 6 && day === 6) {
            return {
                label: '🎌 KỲ THI JLPT N3 CHÍNH THỨC',
                blocks: [
                    { time: 'Sáng (8h - 12h)', pills: [{ c: 'p-mock', t: 'Thi thật: Kiến thức ngôn ngữ (Từ vựng, Kanji, Ngữ pháp)' }] },
                    { time: 'Chiều (13h - 16h)', pills: [{ c: 'p-mock', t: 'Thi Đọc hiểu & Nghe hiểu — Giữ vững tinh thần!' }] },
                    { time: 'Sau thi', pills: [{ c: 'p-review', t: 'Tổng kết & nghỉ ngơi, chúc mừng chiến binh!' }] }
                ]
            };
        }

        const dow = new Date(year, month, day).getDay();     // 0: CN, 1: T2 ... 6: T7
        const isTuesday = (dow === 2);
        const isThursday = (dow === 4);
        const isMonday = (dow === 1);
        const isWednesday = (dow === 3);
        const isFriday = (dow === 5);
        const sat = isSat(year, month, day);
        const sun = isSun(year, month, day);
        const workday = isWorkday(year, month, day);

        // ---- GIAI ĐOẠN 1: NỀN TẢNG (3/4 - 27/4) ----
        if (phase === 1) {
            if (workday) {
                if (isMonday) {
                    return { blocks: [{ time: '20h - 21h30', pills: [{ c: 'p-vocab', t: 'Mimikara N3: 15 từ vựng mới' }, { c: 'p-kanji', t: '5 chữ Kanji cơ bản' }] }] };
                }
                if (isTuesday || isThursday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-vocab', t: 'Ôn từ vựng + làm flashcard' }, { c: 'p-stm32', t: 'STM32: GPIO, cấu hình clock' }] }] };
                }
                if (isWednesday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-kanji', t: '5 chữ Kanji + bài tập viết' }, { c: 'p-grammar', t: 'Ngữ pháp N3: 1~2 mẫu câu' }] }] };
                }
                if (isFriday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-grammar', t: 'Ôn mẫu ngữ pháp + bài tập' }, { c: 'p-kanji', t: 'Kanji mới + ôn đầu tuần' }] }] };
                }
            }
            if (sat) {
                return {
                    blocks: [
                        { time: '8h - 11h', pills: [{ c: 'p-vocab', t: 'Mimikara: tổng hợp từ vựng tuần' }, { c: 'p-kanji', t: 'Luyện viết Kanji 20 chữ' }] },
                        { time: '13h - 15h', pills: [{ c: 'p-grammar', t: 'Bài tập ngữ pháp N3' }, { c: 'p-listen', t: 'Luyện nghe N4/N3 (30 phút)' }] },
                        { time: '15h - 17h', pills: [{ c: 'p-stm32', t: 'STM32: project đèn LED + nút nhấn' }] }
                    ]
                };
            }
            if (sun) {
                return {
                    blocks: [
                        { time: '8h - 10h', pills: [{ c: 'p-review', t: 'Ôn từ vựng & kanji đã học' }] },
                        { time: '10h - 12h', pills: [{ c: 'p-grammar', t: 'Kiểm tra nhỏ ngữ pháp (15 câu)' }] }
                    ]
                };
            }
        }

        // ---- GIAI ĐOẠN 2: CỦNG CỐ (28/4 - 1/6) ----
        if (phase === 2) {
            if (workday) {
                if (isMonday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-vocab', t: 'Từ vựng theo chủ đề (gia đình, công việc)' }, { c: 'p-kanji', t: 'Kanji bài 21-30' }] }] };
                }
                if (isTuesday || isThursday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-listen', t: 'Nghe N3: bài hội thoại' }, { c: 'p-stm32', t: 'STM32: I2C, cảm biến nhiệt' }] }] };
                }
                if (isWednesday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-grammar', t: 'Ngữ pháp nâng cao N3: đảo ngữ, thể' }, { c: 'p-reading', t: 'Đọc hiểu đoạn văn 200-300字' }] }] };
                }
                if (isFriday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-kanji', t: 'Ôn Kanji 31-40' }, { c: 'p-grammar', t: 'Luyện đề mini (grammar)' }] }] };
                }
            }
            if (sat) {
                return {
                    blocks: [
                        { time: '8h - 11h', pills: [{ c: 'p-reading', t: 'Đọc hiểu 2-3 bài N3 (chiến thuật)' }, { c: 'p-listen', t: 'Nghe chép chính tả N3' }] },
                        { time: '13h - 15h', pills: [{ c: 'p-vocab', t: 'Flashcard tổng hợp N3 (300 từ)' }, { c: 'p-kanji', t: 'Kanji 1-40 ôn nhanh' }] },
                        { time: '15h - 17h', pills: [{ c: 'p-stm32', t: 'STM32: LCD1602 + cảm biến' }] }
                    ]
                };
            }
            if (sun) {
                return {
                    blocks: [
                        { time: '8h - 10h', pills: [{ c: 'p-review', t: 'Ôn lại từ vựng, kanji yếu' }] },
                        { time: '10h - 12h', pills: [{ c: 'p-mock', t: 'Mini test: Từ vựng + Ngữ pháp (40 câu)' }] }
                    ]
                };
            }
        }

        // ---- GIAI ĐOẠN 3: LUYỆN ĐỀ (2/6 - 6/7) ----
        if (phase === 3) {
            if (workday) {
                if (isMonday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-review', t: 'Phân tích lỗi sai từ đề thi thử' }, { c: 'p-vocab', t: 'Từ vựng dễ nhầm lẫn' }] }] };
                }
                if (isTuesday || isThursday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-listen', t: 'Nghe đề thi thật N3 (full speed)' }, { c: 'p-stm32', t: 'STM32: ôn nhẹ (giảm tải)' }] }] };
                }
                if (isWednesday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-grammar', t: 'Đề luyện ngữ pháp chọn lọc' }, { c: 'p-reading', t: 'Đọc hiểu đề thi thử' }] }] };
                }
                if (isFriday) {
                    return { blocks: [{ time: '20h - 22h', pills: [{ c: 'p-mock', t: 'Luyện đề từng phần (30 phút)' }, { c: 'p-review', t: 'Review đáp án & mẹo' }] }] };
                }
            }
            if (sat) {
                return {
                    blocks: [
                        { time: '8h - 12h', pills: [{ c: 'p-mock', t: '🔴 THI THỬ FULL N3 (110 phút - đúng format)' }, { c: 'p-review', t: 'Chấm điểm + phân tích lỗi' }] },
                        { time: '13h - 16h', pills: [{ c: 'p-review', t: 'Tập trung vào phần yếu nhất (Nghe/Đọc)' }, { c: 'p-vocab', t: 'Flashcard tốc độ cao' }] }
                    ]
                };
            }
            if (sun) {
                return {
                    blocks: [
                        { time: '8h - 10h', pills: [{ c: 'p-review', t: 'Ôn nhẹ từ vựng & kanji siêu tốc' }] },
                        { time: '10h - 12h', pills: [{ c: 'p-grammar', t: 'Xem lại ngữ pháp hay nhầm lẫn' }] }
                    ]
                };
            }
        }
        return null;
    }

    // lấy tối đa 3 pill để hiển thị trên cell
    function getSummaryPills(schedule) {
        if (!schedule || !schedule.blocks) return [];
        let all = [];
        for (let block of schedule.blocks) {
            if (block.pills) {
                for (let p of block.pills) all.push(p);
            }
        }
        return all.slice(0, 3);
    }

    // render lịch tháng hiện tại
    function renderCalendar() {
        const year = curYear;
        const month = curMonth;
        const monthTitleElem = document.getElementById('month-title');
        monthTitleElem.innerText = `${MONTHS_VI[month]} ${year}`;

        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        // Giới hạn: chỉ từ tháng 4/2026 đến tháng 7/2026
        const isPrevDisabled = (year === 2026 && month === 3);  // không cho lui về tháng 3
        const isNextDisabled = (year === 2026 && month === 6);  // không cho sang tháng 8
        prevBtn.disabled = isPrevDisabled;
        nextBtn.disabled = isNextDisabled;

        const firstDayOfMonth = new Date(year, month, 1);
        const startDow = firstDayOfMonth.getDay(); // 0: CN, 1: T2...
        let offset = (startDow === 0 ? 6 : startDow - 1); // chuyển sang T2 đầu tuần

        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const todayRef = new Date(2026, 3, 3); // mốc 3/4 để đánh dấu hôm nay bắt đầu lộ trình

        const calendarBody = document.getElementById('cal-body');
        calendarBody.innerHTML = '';

        // ô trống đầu tháng
        for (let i = 0; i < offset; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'cell empty';
            calendarBody.appendChild(emptyDiv);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const cell = document.createElement('div');
            const phase = getPhase(year, month, d);
            const sat = isSat(year, month, d);
            const sun = isSun(year, month, d);
            const isTodayMarker = (year === todayRef.getFullYear() && month === todayRef.getMonth() && d === todayRef.getDate());
            const isExamDay = (year === 2026 && month === 6 && d === 6);
            let cellClass = 'cell';
            if (sat) cellClass += ' sat';
            if (sun) cellClass += ' sun';
            if (isTodayMarker) cellClass += ' today';
            if (isExamDay) cellClass += ' exam';
            else if (phase === 1) cellClass += ' phase1';
            else if (phase === 2) cellClass += ' phase2';
            else if (phase === 3) cellClass += ' phase3';
            cell.className = cellClass;

            const schedule = getSchedule(year, month, d);
            const summaryPills = schedule ? getSummaryPills(schedule) : [];

            let innerHtml = `<div class="cell-date">${d}</div>`;
            for (let p of summaryPills) {
                innerHtml += `<div class="pill ${p.c}">${p.t.substring(0, 26)}</div>`;
            }
            cell.innerHTML = innerHtml;

            cell.addEventListener('click', (function(y, m, dVal) {
                return function() { showDetail(y, m, dVal); };
            })(year, month, d));

            calendarBody.appendChild(cell);
        }

        // fill thêm ô trống cuối tháng để đủ 42 ô (6 dòng)
        const totalCells = offset + daysInMonth;
        const remaining = 42 - totalCells;
        if (remaining > 0) {
            for (let i = 0; i < remaining; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'cell empty';
                calendarBody.appendChild(emptyDiv);
            }
        }
    }

    // Hiển thị chi tiết ngày
    function showDetail(year, month, day) {
        const detailPanel = document.getElementById('detail-panel');
        const schedule = getSchedule(year, month, day);
        const phase = getPhase(year, month, day);
        const phaseText = ['', '🏁 Giai đoạn 1: Nền tảng', '⚙️ Giai đoạn 2: Củng cố', '🔥 Giai đoạn 3: Luyện đề'];
        const dowNames = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
        const dow = new Date(year, month, day).getDay();
        const dateStr = `${dowNames[dow]}, ${day}/${month+1}/${year}`;
        let phaseBadge = '';
        if (phase >= 1 && phase <= 3) {
            phaseBadge = `<span style="background:${phase===1?'#5A7AFF30':phase===2?'#1D9E7530':'#D85A3030'}; color:#ddd; border-radius:24px; padding:2px 10px; font-size:11px; margin-left:10px;">${phaseText[phase]}</span>`;
        }

        if (!schedule) {
            detailPanel.innerHTML = `<div class="detail-date">${dateStr} ${phaseBadge}</div>
                                     <div class="no-select">📭 Không có kế hoạch học trong ngày này (trước 3/4 hoặc sau 6/7).</div>`;
            return;
        }

        let html = `<div class="detail-date">${dateStr} ${phaseBadge}</div>`;
        if (schedule.label) {
            html += `<div style="font-size:1rem; font-weight:bold; background:#332211; padding:6px 12px; border-radius:30px; margin-bottom:14px; color:#FFC285;">📌 ${schedule.label}</div>`;
        }
        for (let block of schedule.blocks) {
            html += `<div class="detail-block">
                        <div class="detail-time">⏰ ${block.time}</div>
                        <div class="detail-pills">`;
            for (let pill of block.pills) {
                html += `<span class="detail-pill ${pill.c}">${pill.t}</span>`;
            }
            html += `</div></div>`;
        }
        detailPanel.innerHTML = html;
    }

    function changeMonth(direction) {
        let newMonth = curMonth + direction;
        let newYear = curYear;

        if (newMonth < 0) {
            newMonth = 11;
            newYear--;
        } else if (newMonth > 11) {
            newMonth = 0;
            newYear++;
        }

        // Giới hạn chỉ từ tháng 4/2026 đến tháng 7/2026
        if (newYear === 2026 && newMonth >= 3 && newMonth <= 6) {
            curYear = newYear;
            curMonth = newMonth;
            renderCalendar();
            const panel = document.getElementById('detail-panel');
            panel.innerHTML = '<div class="no-select">📌 Bấm vào ngày để xem chi tiết kế hoạch học tập.</div>';
        } else if (newYear === 2026 && newMonth === 2) {
            // không cho lui về tháng 3
            return;
        } else if (newYear === 2026 && newMonth === 7) {
            // không cho sang tháng 8
            return;
        } else if (newYear > 2026 || newYear < 2026) {
            return;
        }
    }

    // attach events
    document.getElementById('prev-btn').onclick = () => changeMonth(-1);
    document.getElementById('next-btn').onclick = () => changeMonth(1);

    renderCalendar();
</script>
</body>
</html>
